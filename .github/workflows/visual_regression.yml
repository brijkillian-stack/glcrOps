name: Print Regression — Zone Deployment Book

on:
  pull_request:
    paths:
      - "apps/zds/engine/**"
      - "apps/zds/print_renderer.py"
      - "apps/zds/api/**"
      - "tests/print_regression/**"
      - "requirements-dev.txt"
  push:
    branches: [main]
    paths:
      - "apps/zds/engine/**"
      - "apps/zds/print_renderer.py"
      - "apps/zds/api/**"
      - "tests/print_regression/**"
      - "requirements-dev.txt"
  # Allow manual trigger for golden verification / post-golden-update smoke check.
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR so we don't pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Tier 1: Golden integrity — always runs, no secrets, no external deps.
  # If this fails the PR is blocked.  Fast (<60 s).
  # ─────────────────────────────────────────────────────────────────────────────
  tier1:
    name: "Tier 1 — Golden integrity"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true        # pull golden PDF + PNGs tracked in Git LFS

      - name: Pull LFS objects
        run: git lfs pull

      - name: Install OS deps (poppler for pdf2image)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements-dev.txt

      - name: Run Tier 1 tests
        run: |
          pytest tests/print_regression/ \
            -v \
            -m tier1 \
            --tb=short \
            --no-header

      # Tier 1 failure means golden artifacts are missing or corrupted.
      # Upload the manifest for fast triage without cloning.
      - name: Upload manifest on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-manifest
          path: tests/print_regression/golden/manifest.json
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Tier 2: Text regression — requires Supabase secrets + source xlsx.
  # Skipped on fork PRs (no secret access); Tier 1 still gates merges.
  # ─────────────────────────────────────────────────────────────────────────────
  tier2:
    name: "Tier 2 — Text regression"
    runs-on: ubuntu-latest
    needs: tier1
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS objects
        run: git lfs pull

      - name: Install OS deps
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements-dev.txt

      - name: Run Tier 1 + Tier 2 tests
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # PRINT_REGRESSION_WEEK is read from manifest.json — no need to set here.
        run: |
          pytest tests/print_regression/ \
            -v \
            -m "tier1 or tier2" \
            --tb=short \
            --no-header
        # Tier 2 auto-skips if the source xlsx is absent from golden/inputs/.
        # A skip is not a failure — source xlsx is NOT committed to the repo.

      - name: Upload diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: print-regression-diffs-${{ github.run_id }}
          path: tests/print_regression/diffs/
          retention-days: 30
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Tier 1 integrity guard: ensure golden PNG count is never wrong.
  # Catches accidental golden corruption before it reaches main.
  # ─────────────────────────────────────────────────────────────────────────────
  golden-guard:
    name: "Golden guard — PNG count sanity"
    runs-on: ubuntu-latest
    needs: tier1

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS objects
        run: git lfs pull

      - name: Assert PNG count matches manifest
        run: |
          python3 - << 'EOF'
          import json, glob, sys
          from pathlib import Path

          manifest = json.loads(
              Path("tests/print_regression/golden/manifest.json").read_text()
          )
          week_key   = manifest["week_key"]
          expected   = manifest["page_count"]
          pngs       = sorted(glob.glob(
              f"tests/print_regression/golden/zone_deployment_book_{week_key}/page_*.png"
          ))
          actual = len(pngs)

          if actual != expected:
              print(f"FAIL: manifest says {expected} pages, found {actual} PNGs.")
              print(f"  Week: {week_key}")
              print(f"  PNGs: {[p.split('/')[-1] for p in pngs]}")
              sys.exit(1)

          print(f"OK: {actual} PNGs match manifest (week={week_key})")
          EOF
