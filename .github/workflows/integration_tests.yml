name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    name: Smoke test (live API)
    runs-on: ubuntu-latest
    if: success() && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt httpx python-dotenv uvicorn

    - name: Start Forge API (background)
      run: |
        python -m uvicorn apps.zds.api.main:app --port 8001 &
        # Wait up to 15 s for the server to be ready
        for i in $(seq 1 15); do
          curl -sf http://localhost:8001/health && break
          echo "Waiting for server ($i)…"
          sleep 1
        done

    - name: Run smoke test
      run: python scripts/smoke_test.py
      env:
        PRINT_SERVICE_URL: http://localhost:8001
